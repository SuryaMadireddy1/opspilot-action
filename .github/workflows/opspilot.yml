name: OpsPilot
on: [pull_request]
permissions:
  pull-requests: write
  contents: read
jobs:
  opspilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SuryaMadireddy1/opspilot-action/action@feature/inline-suggestions
        with:
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          llm-provider: groq
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}